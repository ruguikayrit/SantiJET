kind = "web"
previewPath = "/neon/"
title = "ŞantiJET Neon"
version = "1.0.0"
id = "artifacts/santijet-neon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/neon/" ]
localPort = 23301

[services.development]
run = "pnpm --filter @workspace/santijet-neon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/santijet-neon", "run", "build" ]
publicDir = "artifacts/santijet-neon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23301"
BASE_PATH = "/neon/"
