name: santijet_bfa
description: "ŞantiJET BFA — Birim Fiyat Analizleri (Flutter). ŞantiJET Demir referans mimarisiyle hizalı."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

# NOT: Bağımlılık sürümleri ŞantiJET Demir referans projesiyle (artifacts/santijet-demir)
# bilinçli olarak hizalanmıştır. Ürün ailesi genelinde tutarlılık ve Demir tasarım
# sistemi/bileşenlerinin doğrudan yeniden kullanımı hedeflenir. Kod üretimi (codegen)
# kullanılmaz — Demir gibi düz Riverpod sağlayıcıları ve elle yazılmış varlık sınıfları.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  intl: ^0.19.0
  equatable: ^2.0.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  pdf: ^3.13.0
  printing: ^5.15.0
  share_plus: ^13.1.0
  path_provider: ^2.1.6
  archive: ^4.0.9
  file_picker: ^3.0.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Resmi katalog JSON dosyaları (13.436 kayıt).
  assets:
    - assets/data/
    - assets/images/

  # Fontlar paketlenir (offline) — ŞantiJET Demir tipografisiyle aynı aileler.
  # Inter değişken font: Flutter, fontWeight'i wght eksenine uygular.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
