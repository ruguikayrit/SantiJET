  <style>

  <script>
    // ŞantiJET DEMİR — iOS PWA viewport düzeltmeleri (v7)
    (function () {
      var APP_VERSION = '13';
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var isStandalone = window.navigator.standalone === true ||
        (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);

      function viewportHeight() {
        // PWA standalone: görünür alan — siyah boşluk / kayma önlenir.
        if (isStandalone && window.visualViewport && window.visualViewport.height > 0) {
          return window.visualViewport.height;
        }
        return window.innerHeight;
      }

      function viewportWidth() {
        if (isStandalone && window.visualViewport && window.visualViewport.width > 0) {
          return window.visualViewport.width;
        }
        return window.innerWidth;
      }

      // Flutter iOS'ta clientHeight kullanır.
      if (isIOS) {
        try {
          Object.defineProperty(document.documentElement, 'clientHeight', {
            get: viewportHeight,
            configurable: true,
          });
          Object.defineProperty(document.documentElement, 'clientWidth', {
            get: viewportWidth,
            configurable: true,
          });
        } catch (e) { /* ignore */ }

        // Viewport boyutu değişince Flutter'a bildir.
        function notifyResize() {
          window.dispatchEvent(new Event('resize'));
        }
        window.addEventListener('resize', notifyResize);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', notifyResize);
        }
      }

      // Flutter viewport meta etiketini değiştirebilir — viewport-fit=cover koru.
      function ensureViewportFit() {
        var vp = document.querySelector('meta[name="viewport"]');
        if (vp && vp.content.indexOf('viewport-fit=cover') === -1) {
          vp.content = vp.content + ', viewport-fit=cover';
        }
      }
      ensureViewportFit();
      if (window.MutationObserver) {
        new MutationObserver(ensureViewportFit).observe(document.documentElement, {
          childList: true,
          subtree: true,
        });
      }

      // iOS PWA: klavye sonrası viewport kaymasını sıfırla.
      if (isIOS && isStandalone) {
        var resetScroll = function () {
          window.scrollTo(0, 0);
          document.documentElement.scrollTop = 0;
          document.body.scrollTop = 0;
        };
        window.addEventListener('scroll', resetScroll, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', resetScroll);
        }
        document.addEventListener('focusin', resetScroll);
        document.addEventListener('focusout', resetScroll);
      }

      // iOS PWA standalone: sistem jestlerinin tap'leri yutmasını engelle.
      function attachTouchGuard() {
        var target = document.querySelector('flutter-view') || document.body;
        if (!target || target.__santijetTouchGuard) return;
        target.__santijetTouchGuard = true;
        target.addEventListener('touchstart', function () {}, { passive: false });
      }
      if (isIOS && isStandalone) {
        document.addEventListener('DOMContentLoaded', attachTouchGuard);
        // flutter-view geç yüklenebilir.
        var touchObserver = new MutationObserver(function () {
          attachTouchGuard();
        });
        touchObserver.observe(document.body, { childList: true, subtree: true });
        setTimeout(attachTouchGuard, 500);
        setTimeout(attachTouchGuard, 2000);
      }

      // Service worker GitHub Pages alt yolunda sorun çıkarabiliyor — her zaman kaldır.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function (keys) {
          keys.forEach(function (key) { caches.delete(key); });
        });
      }

      var STORED_VERSION = localStorage.getItem('santijet_app_version');
      if (STORED_VERSION !== APP_VERSION) {
        localStorage.setItem('santijet_app_version', APP_VERSION);
      }

      // Flutter 30 sn içinde başlamazsa kullanıcıya ipucu göster.
      setTimeout(function () {
        var el = document.getElementById('santijet-loading');
        if (el && el.parentNode) {
          el.innerHTML = 'Yükleme uzun sürüyor…<br><span style="font-size:12px;margin-top:8px;display:block;">Sayfayı yenileyin (Ctrl+F5) veya önbelleği temizleyin.</span>';
        }
      }, 30000);

      window.__SANTIJET_APP_VERSION__ = APP_VERSION;
    })();
  </script>
