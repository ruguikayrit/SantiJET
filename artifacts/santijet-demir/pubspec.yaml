name: santijet_demir
description: ŞantiJET DEMİR — Çelik Takip Sistemi. Demir keşfi, sipariş, teslimat ve saha sayımı.
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  equatable: ^2.0.7
  pdf: ^3.11.1
  printing: ^5.13.4
  excel: ^4.0.6
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  dxf: ^3.1.3
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.5
  pointer_interceptor: ^0.10.1+2
  crypto: ^3.0.6
  supabase_flutter: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/s_logo.png
  adaptive_icon_background: '#05070A'
  adaptive_icon_foreground: assets/images/s_logo.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: '#05070A'
  image: assets/images/s_logo.png
  android_12:
    color: '#05070A'
    image: assets/images/s_logo.png
  ios: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
