kind = "mobile"
previewPath = "/"
title = "Şantiye Takip"
version = "1.0.0"
id = "artifacts/santiye-takip"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24914

[services.development]
run = "pnpm --filter @workspace/santiye-takip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/santiye-takip", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/santiye-takip", "run", "serve" ]

[services.env]
PORT = "24914"
BASE_PATH = "/"
