name: Deploy ŞantiJET DEMİR Web (iPhone Safari)

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/santijet-demir/**'
      - '.github/workflows/deploy-santijet-demir-web.yml'
  workflow_dispatch:

concurrency:
  group: pages-santijet-demir
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build web
        working-directory: artifacts/santijet-demir
        run: |
          flutter pub get
          flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/santijet-demir/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
